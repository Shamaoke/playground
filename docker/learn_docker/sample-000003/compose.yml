version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: sample-000003-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/http.d:/etc/nginx/http.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - forgejo
    networks:
      - platform

  forgejo:
    image: codeberg.org/forgejo/forgejo:latest
    container_name: sample-000003-forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - ./forgejo:/data
    networks:
      - platform
    expose:
      - "3000"

networks:
  platform:
    driver: bridge
